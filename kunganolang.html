<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberWeb - QCPD-ACT Intelligence Dashboard</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Sample ng mga kung anong data
        const sampleReports = [
            {
                id: 1,
                entryNo: "2025-09-000000",
                date: "September 30, 2025",
                time: "9:00 PM",
                type: "Swindling/Estafa",
                attendedBy: "Pat D. Rodriguez",
                riskLevel: "high",
                riskScore: 9,
                summary: "On the same date, a woman received a text message via Messenger from someone claiming to be a friend, requesting to borrow ₱50,000 due to a financial emergency. After communicating with the 'friend,' the woman proceeded to transfer the money and later discovered the account was created for fraudulent transactions, and reported the incident."
            },
            {
                id: 2,
                entryNo: "2025-09-000001",
                date: "September 29, 2025",
                time: "4:10 PM",
                type: "Identity Theft",
                attendedBy: "Maria S. Santos",
                riskLevel: "medium",
                riskScore: 7,
                summary: "Complainant reported that an unknown individual used their personal information to open unauthorized bank accounts and apply for loans."
            },
            {
                id: 3,
                entryNo: "2025-09-000002",
                date: "September 28, 2025",
                time: "7:25 PM",
                type: "Phishing",
                attendedBy: "Pat D. Rodriguez",
                riskLevel: "medium",
                riskScore: 6,
                summary: "Victim received a fraudulent email appearing to be from a legitimate bank, requesting account verification details."
            },
            {
                id: 4,
                entryNo: "2025-09-000003",
                date: "September 27, 2025",
                time: "9:30 PM",
                type: "Account Takeover",
                attendedBy: "Maria S. Santos",
                riskLevel: "high",
                riskScore: 8,
                summary: "E-wallet account was accessed by unauthorized party who changed security credentials and transferred funds."
            },
            {
                id: 5,
                entryNo: "2025-09-000004",
                date: "September 26, 2025",
                time: "2:20 PM",
                type: "Swindling/Estafa",
                attendedBy: "Pat D. Rodriguez",
                riskLevel: "medium",
                riskScore: 6,
                summary: "Online seller received payment but failed to deliver purchased items, subsequently blocking all communication."
            },
            {
                id: 6,
                entryNo: "2025-09-000005",
                date: "September 26, 2025",
                time: "11:15 AM",
                type: "Online Harassment",
                attendedBy: "Maria S. Santos",
                riskLevel: "low",
                riskScore: 3,
                summary: "Complainant reported receiving threatening messages through social media platforms from an anonymous account."
            }
        ];

        function Dashboard() {
            const [selectedReport, setSelectedReport] = useState(sampleReports[0]);
            const [filterLevel, setFilterLevel] = useState('all');
            const [currentPage, setCurrentPage] = useState(1);
            const [searchTerm, setSearchTerm] = useState('');

            const stats = {
                total: 45,
                high: 10,
                medium: 18,
                low: 17
            };

            const filteredReports = sampleReports.filter(report => {
                const matchesFilter = filterLevel === 'all' || report.riskLevel === filterLevel;
                const matchesSearch = report.entryNo.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                    report.type.toLowerCase().includes(searchTerm.toLowerCase()) ; 
                return matchesFilter && matchesSearch;
            });

            return (
                <div className="dashboard-container">
                    {/* Sidebar */}
                    <aside className="sidebar">
                        <div className="logo">
                            <div className="logo-icon">CW</div>
                            <div className="logo-text">
                                <h1>CyberWeb</h1>
                                <p>QCPD-ACT</p>
                            </div>
                        </div>

                        <ul className="nav-menu">
                            <li className="nav-item">
                                <a href="#" className="nav-link active">
                                    <span className="nav-icon">📊</span>
                                    Dashboard
                                </a>
                            </li>
                            <li className="nav-item">
                                <a href="#" className="nav-link">
                                    <span className="nav-icon">📝</span>
                                    New Report
                                </a>
                            </li>
                            <li className="nav-item">
                                <a href="#" className="nav-link">
                                    <span className="nav-icon">📁</span>
                                    Cases
                                    <span className="badge">38</span>
                                </a>
                            </li>
                            <li className="nav-item">
                                <a href="#" className="nav-link">
                                    <span className="nav-icon">🔴</span>
                                    High Risk
                                </a>
                            </li>
                            <li className="nav-item">
                                <a href="#" className="nav-link">
                                    <span className="nav-icon">🟡</span>
                                    Medium Risk
                                </a>
                            </li>
                            <li className="nav-item">
                                <a href="#" className="nav-link">
                                    <span className="nav-icon">🔍</span>
                                    Search
                                </a>
                            </li>
                            <li className="nav-item">
                                <a href="#" className="nav-link">
                                    <span className="nav-icon">⚙️</span>
                                    Settings
                                </a>
                            </li>
                            <li className="nav-item">
                                <a href="#" className="nav-link">
                                    <span className="nav-icon">🚪</span>
                                    Log Out
                                    <span className="badge">NEW</span>
                                </a>
                            </li>
                        </ul>
                    </aside>

                    <main className="main-content">
                        {/* header */}
                        <div className="header">
                            <h2>Dashboard</h2>
                            <div className="user-info">
                                <button className="notification-btn">
                                    <span>🔔</span>
                                    <span className="notification-dot"></span>
                                </button>
                                <div className="user-profile">
                                    <div className="user-avatar">V</div>
                                    <div className="user-details">
                                        <h4>Visitor</h4>
                                        <p>Officer</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* stats cards */}
                        <div className="stats-grid">
                            <div className="stat-card total">
                                <div className="stat-header">
                                    <div>
                                        <div className="stat-label">Total Cases</div>
                                        <div className="stat-value">{stats.total}</div>
                                        <div className="stat-trend">
                                            <span className="trend-up">↑ +5</span>
                                            <span>Last week</span>
                                        </div>
                                    </div>
                                    <div className="stat-icon">📊</div>
                                </div>
                            </div>

                            <div className="stat-card high">
                                <div className="stat-header">
                                    <div>
                                        <div className="stat-label">High Risk</div>
                                        <div className="stat-value">{stats.high}</div>
                                        <div className="stat-trend">
                                            <span className="trend-up">↑ +8</span>
                                            <span>Last week</span>
                                        </div>
                                    </div>
                                    <div className="stat-icon">🔴</div>
                                </div>
                            </div>

                            <div className="stat-card medium">
                                <div className="stat-header">
                                    <div>
                                        <div className="stat-label">Medium Risk</div>
                                        <div className="stat-value">{stats.medium}</div>
                                        <div className="stat-trend">
                                            <span>↔ +3</span>
                                            <span>Last week</span>
                                        </div>
                                    </div>
                                    <div className="stat-icon">🟡</div>
                                </div>
                            </div>
                        </div>

                        {/* content grid */}
                        <div className="content-grid">
                            {/* recent reports tugdung*/}
                            <div className="panel">
                                <div className="panel-header">
                                    <h3 className="panel-title">Recent Reports</h3>
                                    <a href="#" className="view-all">View All →</a>
                                </div>

                                {/* filters */}
                                <div className="filters">
                                    <div className="filter-group">
                                        <button 
                                            className={`filter-btn ${filterLevel === 'all' ? 'active' : ''}`}
                                            onClick={() => setFilterLevel('all')}
                                        >
                                            All Levels
                                        </button>
                                        <button 
                                            className={`filter-btn ${filterLevel === 'high' ? 'active' : ''}`}
                                            onClick={() => setFilterLevel('high')}
                                        >
                                            High Risk
                                        </button>
                                        <button 
                                            className={`filter-btn ${filterLevel === 'medium' ? 'active' : ''}`}
                                            onClick={() => setFilterLevel('medium')}
                                        >
                                            Medium Risk
                                        </button>
                                        <button 
                                            className={`filter-btn ${filterLevel === 'low' ? 'active' : ''}`}
                                            onClick={() => setFilterLevel('low')}
                                        >
                                            Low Risk
                                        </button>
                                    </div>
                                    <input 
                                        type="text" 
                                        className="search-input" 
                                        placeholder="Search reports..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>

                                {/* reports table */}
                                <table className="reports-table">
                                    <thead>
                                        <tr>
                                            <th>Entry No.</th>
                                            <th>Incident Date</th>
                                            <th>Cybercrime Type</th>
                                            <th>Attended By</th>
                                            <th>Risk</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredReports.map(report => (
                                            <tr 
                                                key={report.id} 
                                                onClick={() => setSelectedReport(report)}
                                            >
                                                <td className="entry-number">{report.entryNo}</td>
                                                <td>{report.date}</td>
                                                <td>{report.type}</td>
                                                <td>{report.attendedBy}</td>
                                                <td>
                                                    <span className={`risk-badge ${report.riskLevel}`}>
                                                        <span className="risk-indicator"></span>
                                                        {report.riskLevel} {report.riskScore}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>

                                {/* pagination */}
                                <div className="pagination">
                                    <button className="page-btn" disabled>←</button>
                                    <button className="page-btn">⏮</button>
                                    <button className="page-btn active">1</button>
                                    <button className="page-btn">2</button>
                                    <button className="page-btn">3</button>
                                    <button className="page-btn">4</button>
                                    <button className="page-btn">5</button>
                                    <button className="page-btn">6</button>
                                    <button className="page-btn">⏭</button>
                                    <button className="page-btn">→</button>
                                </div>
                            </div>

                            {/* risk breakdown */}
                            <div className="panel">
                                <div className="panel-header">
                                    <h3 className="panel-title">Risk Score Breakdown</h3>
                                    <a href="#" className="view-all">↗</a>
                                </div>

                                {/* chart */}
                                <div className="chart-container">
                                    <svg viewBox="0 0 200 200" className="donut-chart">
                                        <circle
                                            cx="100"
                                            cy="100"
                                            r="80"
                                            fill="none"
                                            stroke="#ff4757"
                                            strokeWidth="30"
                                            strokeDasharray="150 351"
                                            transform="rotate(-90 100 100)"
                                        />
                                        <circle
                                            cx="100"
                                            cy="100"
                                            r="80"
                                            fill="none"
                                            stroke="#ffa502"
                                            strokeWidth="30"
                                            strokeDasharray="170 351"
                                            strokeDashoffset="-150"
                                            transform="rotate(-90 100 100)"
                                        />
                                        <circle
                                            cx="100"
                                            cy="100"
                                            r="80"
                                            fill="none"
                                            stroke="#6BCF7F"
                                            strokeWidth="30"
                                            strokeDasharray="160 351"
                                            strokeDashoffset="-320"
                                            transform="rotate(-90 100 100)"
                                        />
                                    </svg>
                                    <div className="chart-center">
                                        <div className="chart-center-value">{stats.total}</div>
                                        <div className="chart-center-label">Total</div>
                                    </div>
                                </div>

                                {/* legend ng kung anong chart */}
                                <div className="chart-legend">
                                    <div className="legend-item">
                                        <div className="legend-label">
                                            <div className="legend-color" style={{background: '#ff4757'}}></div>
                                            <span className="legend-text">High Risk</span>
                                        </div>
                                        <div>
                                            <span className="legend-value">{stats.high}</span>
                                            <span className="legend-percentage">22%</span>
                                        </div>
                                    </div>
                                    <div className="legend-item">
                                        <div className="legend-label">
                                            <div className="legend-color" style={{background: '#ffa502'}}></div>
                                            <span className="legend-text">Medium Risk</span>
                                        </div>
                                        <div>
                                            <span className="legend-value">{stats.medium}</span>
                                            <span className="legend-percentage">40%</span>
                                        </div>
                                    </div>
                                    <div className="legend-item">
                                        <div className="legend-label">
                                            <div className="legend-color" style={{background: '#6BCF7F'}}></div>
                                            <span className="legend-text">Low Risk</span>
                                        </div>
                                        <div>
                                            <span className="legend-value">{stats.low}</span>
                                            <span className="legend-percentage">38%</span>
                                        </div>
                                    </div>
                                </div>

                                {/* quick filters para nafifilter yung severity ng kung anong recent reports*/}
                                <div className="quick-filters">
                                    <button 
                                        className={`quick-filter-btn ${filterLevel === 'all' ? 'active' : ''}`}
                                        onClick={() => setFilterLevel('all')}
                                    >
                                        <span className="quick-filter-count">All {stats.total}</span>
                                    </button>
                                    <button 
                                        className={`quick-filter-btn ${filterLevel === 'high' ? 'active' : ''}`}
                                        onClick={() => setFilterLevel('high')}
                                    >
                                        <span className="quick-filter-count">🔴 {stats.high}</span>
                                    </button>
                                    <button 
                                        className={`quick-filter-btn ${filterLevel === 'medium' ? 'active' : ''}`}
                                        onClick={() => setFilterLevel('medium')}
                                    >
                                        <span className="quick-filter-count">🟡 {stats.medium}</span>
                                    </button>
                                    <button 
                                        className={`quick-filter-btn ${filterLevel === 'low' ? 'active' : ''}`}
                                        onClick={() => setFilterLevel('low')}
                                    >
                                        <span className="quick-filter-count">🟢 {stats.low}</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Detailed Incident View */}
                        {selectedReport && (
                            <div className="incident-detail">
                                <div className="detail-header">
                                    <div>
                                        <div className="detail-title">Detailed Incident View</div>
                                        <div className="detail-entry">Entry No. {selectedReport.entryNo}</div>
                                    </div>
                                    <button className="close-btn" onClick={() => setSelectedReport(null)}>×</button>
                                </div>

                                {/* Details Grid */}
                                <div className="detail-section">
                                    <h4>Incident Information</h4>
                                    <div className="detail-field">
                                        <div className="field-icon">📅</div>
                                        <div className="field-content">
                                            <div className="field-label">Date</div>
                                            <div className="field-value">{selectedReport.date}</div>
                                        </div>
                                    </div>
                                    <div className="detail-field">
                                        <div className="field-icon">🕐</div>
                                        <div className="field-content">
                                            <div className="field-label">Time</div>
                                            <div className="field-value">{selectedReport.time}</div>
                                        </div>
                                    </div>
                                    <div className="detail-field">
                                        <div className="field-icon">⚠️</div>
                                        <div className="field-content">
                                            <div className="field-label">Category</div>
                                            <div className="field-value">{selectedReport.type}</div>
                                        </div>
                                    </div>
                                    <div className="detail-field">
                                        <div className="field-icon">👮</div>
                                        <div className="field-content">
                                            <div className="field-label">Attended By</div>
                                            <div className="field-value">{selectedReport.attendedBy}</div>
                                        </div>
                                    </div>
                                    <div className="detail-field">
                                        <div className="field-icon">📊</div>
                                        <div className="field-content">
                                            <div className="field-label">Severity</div>
                                            <div className="field-value">
                                                <span className={`risk-badge ${selectedReport.riskLevel}`}>
                                                    <span className="risk-indicator"></span>
                                                    {selectedReport.riskLevel} Risk
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Summary */}
                                <div className="detail-section">
                                    <h4>Summary</h4>
                                    <div className="summary-text">
                                        {selectedReport.summary}
                                    </div>
                                </div>

                                {/* Buttons */}
                                <div className="action-buttons">
                                    <button className="action-btn primary">
                                        🖨️ Print Report
                                    </button>
                                    <button className="action-btn secondary">
                                        👁️ View Full Report
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
